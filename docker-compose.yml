name: template-webchat

services:
  app:
    build: .
    container_name: webchat-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/webchat_db
      SECRET_KEY: your-secret-key-change-in-production
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: cocoindex
      KB_CACHE_DIR: /data/kb_cache
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/drive/callback}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - kb_cache:/data/kb_cache
    networks:
      - webchat

  postgres:
    image: postgres:15-alpine
    container_name: webchat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webchat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webchat

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: webchat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webchat

  neo4j:
    image: neo4j:5.26-community
    container_name: webchat-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cocoindex}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-cocoindex} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - webchat

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  kb_cache:

networks:
  webchat:
