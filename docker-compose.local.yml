name: template-webchat-local

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "127.0.0.1:${WEBCHAT_APP_PORT:-8002}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/webchat_db
      SECRET_KEY: ${WEBCHAT_SECRET_KEY:-local-dev-secret-change-before-sharing}
      FRONTEND_URL: http://localhost:${WEBCHAT_APP_PORT:-8002}
      KB_ASSETS_DIR: /app/kb_assets
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./kb_assets:/app/kb_assets
      - app_cache:/app/.cache
    networks:
      - webchat-local

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webchat_db
    ports:
      - "127.0.0.1:${WEBCHAT_DB_PORT:-5455}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webchat-local

volumes:
  postgres_data:
  app_cache:

networks:
  webchat-local:
