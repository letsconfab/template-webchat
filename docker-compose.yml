name: template-webchat

services:
  app:
    build: .
    container_name: webchat-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/webchat_db
      SECRET_KEY: your-secret-key-change-in-production
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://garage:3900
      S3_BUCKET: webchat-storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - webchat

  postgres:
    image: postgres:15-alpine
    container_name: webchat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webchat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webchat

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: webchat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webchat

  garage:
    image: depage/garage:latest
    container_name: webchat-garage
    ports:
      - "3900:3900"
    volumes:
      - garage_data:/data
    environment:
      - GARAGE_SECRET_KEY=changeme-in-production
      - GARAGE_S3_REGION=garage
    networks:
      - webchat

volumes:
  postgres_data:
  qdrant_data:
  garage_data:

networks:
  webchat:
